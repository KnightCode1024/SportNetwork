services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sport_network
      POSTGRES_USER: sport_network
      POSTGRES_PASSWORD: sport_network
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://sport_network:sport_network@db:5432/sport_network
    command: sh -c "uvicorn sport_network_api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
volumes:
  db_data:
