<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        /* Reset styles for email clients */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { margin: 0; padding: 0; }

        /* Base styles - shadcn inspired */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #09090b;
            line-height: 1.6;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            padding: 24px;
        }
        .header {
            font-size: 24px;
            font-weight: 600;
            color: #09090b;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #71717a;
            margin-bottom: 24px;
        }
        .body-text {
            font-size: 14px;
            color: #18181b;
            margin-bottom: 16px;
            line-height: 1.7;
        }
        .button-container {
            text-align: center;
            margin: 24px 0;
        }
        .button {
            display: inline-block;
            background-color: #09090b;
            color: #fafafa;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
        }
        .button:hover {
            background-color: #18181b;
        }
        .footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e4e4e7;
            font-size: 12px;
            color: #71717a;
            text-align: center;
        }
        .link-text {
            font-size: 12px;
            color: #71717a;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            background-color: #f4f4f5;
            color: #18181b;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin: 4px 4px 4px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            {% block content %}{% endblock %}
            <div class="footer">
                {{ app_name }} &copy; 2026. Все права защищены.
            </div>
        </div>
    </div>
</body>
</html>
